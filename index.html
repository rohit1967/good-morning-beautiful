<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Good Morning Beautiful ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

    <h1>
        🌸 Good Morning Beautiful 🌸
    </h1>

    <p>
        Catch <strong>10 Hearts</strong> ❤️
    </p>

    <h2>
        Score :
        <span id="score">0</span>/10
    </h2>

    <div id="playArea">

    </div>

    <button id="giftBtn">
        🎁 Open Your Gift
    </button>

</div>

<div id="giftBox">

    <div class="giftContent">

        <h1>
            ✨ Surprise ✨
        </h1>

        <p>

            Good Morning Beautiful ❤️

            <br><br>

            Every sunrise reminds me that
            beautiful people make every day brighter.

            <br><br>

            😊 Keep Smiling 😊

            <br><br>

            Wishing you a wonderful day filled with happiness,
            peace and lots of beautiful moments.

        </p>

        <button id="restart">

            ❤️ Play Again ❤️

        </button>

    </div>

</div>
<audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
